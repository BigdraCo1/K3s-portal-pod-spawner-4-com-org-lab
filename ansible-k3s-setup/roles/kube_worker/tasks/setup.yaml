---
- name: Get K3s node token from master
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token
  delegate_to: "{{ groups['kube_masters'][0] }}"
  become: true
  run_once: true

- name: Get master node IP
  ansible.builtin.set_fact:
    master_ip: "{{ hostvars[groups['kube_masters'][0]]['ansible_default_ipv4']['address'] }}"
  run_once: true

- name: Install K3s on worker node
  ansible.builtin.shell: >
    curl -sfL https://get.k3s.io | K3S_URL=https://{{ master_ip }}:6443
    K3S_TOKEN={{ k3s_token.content | b64decode | trim }} sh -
  args:
    creates: /usr/local/bin/k3s-agent
  become: true

- name: Wait for K3s agent to be ready
  ansible.builtin.wait_for:
    path: /etc/rancher/k3s/k3s.yaml
    state: present
    timeout: 60
  failed_when: false