# Kubernetes Cluster Inventory
# ==============================

[kube_masters]
master01 ansible_host=<MASTER-IP> ansible_user=<USER> ansible_ssh_private_key_file=~/.ssh/id_ed25519 

[kube_workers]
worker01 ansible_host=<WORKER-IP> ansible_user=<USER> ansible_ssh_private_key_file=~/.ssh/id_ed25519 ansible_become_password="{{ lookup('env', 'PASSWORD') }}"

[kube_cluster:children]
kube_masters
kube_workers

[kube_cluster:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
